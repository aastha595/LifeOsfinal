<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>LifeOS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#09090f;--surface:#111118;--surface2:#1a1a24;--surface3:#22222e;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --primary:#7C3AED;--pl:#A78BFA;--pd:#5B21B6;
  --green:#34D399;--red:#F87171;--orange:#FB923C;--blue:#60A5FA;--pink:#F472B6;--yellow:#FBBF24;
  --text:#f1f1f5;--text2:#94a3b8;--text3:#475569;
  --r:16px;--rs:10px;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh;overflow-x:hidden;}
.hdr{position:sticky;top:0;z-index:100;background:rgba(9,9,15,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.logo{font-size:22px;font-weight:900;background:linear-gradient(135deg,#A78BFA,#F472B6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.mbtn{width:36px;height:36px;border-radius:11px;background:var(--surface2);border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;}
.mbtn span{display:block;width:16px;height:1.5px;background:var(--text2);border-radius:2px;}
#mOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);}
#mDrawer{position:fixed;left:-300px;top:0;bottom:0;width:285px;background:#13131f;z-index:201;transition:left 0.28s cubic-bezier(.4,0,.2,1);overflow-y:auto;padding-bottom:40px;}
#mDrawer.open{left:0;}
.mhdr{padding:18px 16px 12px;border-bottom:1px solid var(--border);}
.sec{display:none;padding:14px 14px 100px;}
.sec.active{display:block;}
.card{background:var(--surface);border-radius:var(--r);padding:16px;border:1px solid var(--border);margin-bottom:12px;}
.csm{background:var(--surface2);border-radius:var(--rs);padding:12px;border:1px solid var(--border);}
.slbl{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;}
.inp{width:100%;padding:12px 14px;border-radius:var(--rs);border:1.5px solid var(--border);background:var(--surface2);color:var(--text);font-size:14px;outline:none;-webkit-appearance:none;}
.inp:focus{border-color:var(--primary);}
.btn{padding:12px 20px;border-radius:var(--rs);border:none;font-size:14px;font-weight:700;cursor:pointer;width:100%;}
.btnp{background:linear-gradient(135deg,var(--pd),var(--primary));color:#fff;}
.btng{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.prog{height:6px;background:var(--surface3);border-radius:3px;overflow:hidden;}
.pf{height:6px;border-radius:3px;transition:width 0.4s;}
.ptabs{display:flex;background:var(--surface2);border-radius:10px;padding:3px;gap:2px;margin-bottom:14px;}
.ptab{flex:1;padding:7px 0;border-radius:8px;border:none;background:transparent;color:var(--text3);font-size:12px;font-weight:600;cursor:pointer;}
.ptab.on{background:var(--surface);color:var(--text);}
.empty{text-align:center;padding:30px 20px;color:var(--text3);}
.empty .ico{font-size:34px;margin-bottom:10px;}
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--green);color:#fff;padding:7px 16px;border-radius:30px;font-size:13px;font-weight:700;z-index:999;transition:transform 0.3s;pointer-events:none;}
#toast.show{transform:translateX(-50%) translateY(0);}
#sind{position:fixed;top:58px;right:12px;background:rgba(52,211,153,0.12);border:1px solid var(--green);color:var(--green);padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;z-index:300;opacity:0;transition:opacity 0.3s;pointer-events:none;}
.trow{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--surface);border-radius:var(--rs);margin-bottom:6px;border:1px solid var(--border);}
.chk{width:22px;height:22px;border-radius:7px;border:2px solid var(--border2);background:transparent;color:#fff;font-size:11px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.chk.dn{background:var(--green);border-color:var(--green);}
.bcrd{display:flex;gap:12px;padding:14px;background:var(--surface);border-radius:var(--rs);border:1px solid var(--border);margin-bottom:8px;}
.hdot{width:10px;height:10px;border-radius:2px;background:var(--surface3);}
.hdot.dn{background:var(--green);}
.tlrow{display:flex;gap:8px;min-height:30px;align-items:flex-start;}
.tlt{width:48px;font-size:10px;color:var(--text3);padding-top:7px;flex-shrink:0;text-align:right;}
.tll{flex:1;border-left:1px solid var(--border);padding-left:10px;padding-top:4px;padding-bottom:4px;}
.tlev{border-left:3px solid var(--primary);border-radius:0 8px 8px 0;padding:6px 10px;margin-bottom:4px;display:flex;align-items:center;gap:8px;}
</style>
</head>
<body>
<div id="sind">✓ Saved</div>
<div id="toast">Saved!</div>
<div class="hdr">
  <div><div style="font-size:10px;color:var(--text3);margin-bottom:1px">👩 Aastha</div><div class="logo">LifeOS</div></div>
  <div style="display:flex;align-items:center;gap:10px">
    <div id="htime" style="font-size:12px;color:var(--text3)"></div>
    <div class="mbtn" onclick="openMenu()"><span></span><span></span><span></span></div>
  </div>
</div>
<div id="mOverlay" onclick="closeMenu()"></div>
<div id="mDrawer">
  <div class="mhdr"><div style="font-size:17px;font-weight:800;color:var(--text)">👩 Aastha</div><div style="font-size:11px;color:var(--text3);margin-top:2px">LifeOS — your command centre</div></div>
  <div id="mItems"></div>
  <div style="padding:14px 16px;border-top:1px solid var(--border);margin-top:8px;display:flex;gap:8px">
    <button onclick="exportData()" style="flex:1;padding:9px 0;border-radius:10px;border:none;background:rgba(52,211,153,0.12);color:var(--green);font-size:12px;font-weight:700;cursor:pointer">📤 Export</button>
    <button onclick="importData()" style="flex:1;padding:9px 0;border-radius:10px;border:none;background:rgba(167,139,250,0.12);color:var(--pl);font-size:12px;font-weight:700;cursor:pointer">📥 Import</button>
  </div>
</div>
<div id="sec-Dashboard" class="sec active"><div id="dashC"></div></div>
<div id="sec-Tasks"     class="sec"><div id="tasksC"></div></div>
<div id="sec-Finance"   class="sec"><div id="finC"></div></div>
<div id="sec-Goals"     class="sec"><div id="goalsC"></div></div>
<div id="sec-Reading"   class="sec"><div id="readC"></div></div>
<div id="sec-Habits"    class="sec"><div id="habC"></div></div>
<div id="sec-Sleep"     class="sec"><div id="sleepC"></div></div>
<div id="sec-Beauty"    class="sec"><div id="beautyC"></div></div>
<div id="sec-Eating"    class="sec"><div id="eatC"></div></div>
<div id="sec-Workout"   class="sec"><div id="woC"></div></div>
<div id="sec-Mindset"   class="sec"><div id="mindC"></div></div>
<div id="sec-Records"   class="sec"><div id="recC"></div></div>
<script>
var today=new Date().toISOString().slice(0,10);
function refreshToday(){today=new Date().toISOString().slice(0,10);}

var state={
  currentTab:"Dashboard",openGroups:{life:true},
  tasks:[],finance:[],financeGoal:{name:"",target:0,saved:0},
  savingsJars:[],budgetLimits:{food:5000,transport:3000,shopping:5000,health:2000,bills:5000,savings:5000,other:2000},
  financeMonth:"",goals:[],goalsPeriod:"monthly",
  books:[],articles:[],quotes:[],readingTab:"books",
  habits:[],habitLogs:{},sleep:[],skin:[],hair:[],meals:[],water:[],
  calorieGoal:2000,waterGoal:8,workouts:[],mindset:[],
  networth:{assets:[],liabilities:[]},
  appUsage:{firstOpen:"",openDates:[],totalSessions:0,totalMinutes:0},
  calendarDay:"",dayView:"list",editingGoal:false
};

var SK=["tasks","finance","financeGoal","savingsJars","budgetLimits","financeMonth",
  "goals","goalsPeriod","books","articles","quotes","readingTab",
  "habits","habitLogs","sleep","skin","hair","meals","water",
  "calorieGoal","waterGoal","workouts","mindset","networth",
  "appUsage","calendarDay","dayView","editingGoal","openGroups"];

function saveState(){
  SK.forEach(function(k){
    try{
      if(state[k]!==undefined){
        var v=JSON.stringify(state[k]);
        localStorage.setItem("mlos_"+k,v);
        localStorage.setItem("mylife_"+k,v);
      }
    }catch(e){
      if(e.name==="QuotaExceededError"){
        if(k==="finance")state.finance=(state.finance||[]).slice(-300);
        if(k==="meals")state.meals=(state.meals||[]).slice(-200);
        if(k==="workouts")state.workouts=(state.workouts||[]).slice(-200);
        try{localStorage.setItem("mlos_"+k,JSON.stringify(state[k]));}catch(e2){}
      }
    }
  });
  try{
    var fb={finance:state.finance,financeGoal:state.financeGoal,savingsJars:state.savingsJars,budgetLimits:state.budgetLimits};
    localStorage.setItem("mlos_fb",JSON.stringify(fb));
    localStorage.setItem("mylife_fb",JSON.stringify(fb));
  }catch(e){}
  try{localStorage.setItem("mylife_state",JSON.stringify(state));}catch(e){}
}

function loadState(){
  var loaded=0;
  SK.forEach(function(k){
    try{
      var v=localStorage.getItem("mlos_"+k)||localStorage.getItem("mylife_"+k);
      if(v!==null){state[k]=JSON.parse(v);loaded++;}
    }catch(e){}
  });
  if(loaded<3){
    try{
      var blob=localStorage.getItem("mylife_state");
      if(blob){
        var p=JSON.parse(blob);
        Object.keys(p).forEach(function(k){
          if(p[k]!==undefined&&(state[k]===undefined||(Array.isArray(p[k])&&p[k].length>(state[k]||[]).length)))state[k]=p[k];
        });
      }
    }catch(e){}
  }
  try{
    var fb=localStorage.getItem("mlos_fb")||localStorage.getItem("mylife_fb")||localStorage.getItem("mlos_finance_backup")||localStorage.getItem("mylife_finance_backup");
    if(fb){
      var fbp=JSON.parse(fb);
      if(fbp.finance&&fbp.finance.length>(state.finance||[]).length)state.finance=fbp.finance;
      if(fbp.financeGoal&&fbp.financeGoal.name&&!state.financeGoal.name)state.financeGoal=fbp.financeGoal;
      if(fbp.savingsJars&&fbp.savingsJars.length>(state.savingsJars||[]).length)state.savingsJars=fbp.savingsJars;
      if(fbp.budgetLimits)state.budgetLimits=Object.assign({},state.budgetLimits,fbp.budgetLimits);
    }
  }catch(e){}
}

var _pt=null;
function persist(){
  clearTimeout(_pt);
  _pt=setTimeout(function(){
    saveState();
    var i=document.getElementById("sind");
    if(i){i.style.opacity="1";setTimeout(function(){i.style.opacity="0";},1200);}
  },300);
}

function showToast(msg){
  var t=document.getElementById("toast");
  if(!t)return;
  t.textContent=msg||"Saved!";
  t.classList.add("show");
  setTimeout(function(){t.classList.remove("show");},1500);
}

var MGROUPS=[
  {id:"dashboard",icon:"🏠",label:"Dashboard",items:[{id:"Dashboard",icon:"🏠",label:"Dashboard"}]},
  {id:"life",icon:"✅",label:"Life",items:[
    {id:"Tasks",icon:"📋",label:"My Day"},
    {id:"Eating",icon:"🍽️",label:"Eating"},
    {id:"Workout",icon:"💪",label:"Workout"},
    {id:"Beauty",icon:"✨",label:"Beauty"},
    {id:"Mindset",icon:"🧠",label:"Positive Content"}
  ]},
  {id:"goals",icon:"🎯",label:"Goals",items:[{id:"Goals",icon:"🎯",label:"Goals"}]},
  {id:"reading",icon:"📚",label:"Reading",items:[{id:"Reading",icon:"📚",label:"Reading"}]},
  {id:"wellness",icon:"🌿",label:"Wellness",items:[
    {id:"Habits",icon:"🔥",label:"Habits"},
    {id:"Sleep",icon:"😴",label:"Sleep"}
  ]},
  {id:"finance",icon:"💰",label:"Finance",items:[{id:"Finance",icon:"💰",label:"Finance"}]},
  {id:"records",icon:"📊",label:"Records",items:[{id:"Records",icon:"📊",label:"Records"}]}
];

function buildMenu(){
  var box=document.getElementById("mItems");if(!box)return;
  var html="";
  MGROUPS.forEach(function(g){
    var isOpen=state.openGroups[g.id];
    var hasActive=g.items.some(function(i){return i.id===state.currentTab;});
    var gc=hasActive?"rgba(124,58,237,0.1)":"transparent";
    var glc=hasActive?"var(--pl)":"var(--text2)";
    var gib=hasActive?"linear-gradient(135deg,var(--pd),var(--primary))":"var(--surface2)";
    html+='<div>';
    html+='<button data-gid="'+g.id+'" onclick="toggleGrp(this.dataset.gid)" style="display:flex;align-items:center;gap:12px;width:100%;padding:11px 16px;background:'+gc+';border:none;cursor:pointer">';
    html+='<div style="width:34px;height:34px;border-radius:11px;background:'+gib+';display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">'+g.icon+'</div>';
    html+='<span style="font-size:13px;font-weight:700;color:'+glc+';flex:1;text-align:left">'+g.label+'</span>';
    html+='<span style="font-size:14px;color:var(--text3);transform:rotate('+(isOpen?"90":"0")+'deg);display:inline-block">›</span>';
    html+='</button>';
    if(isOpen){
      html+='<div>';
      g.items.forEach(function(t){
        var act=state.currentTab===t.id;
        var ib=act?"linear-gradient(135deg,var(--pd),var(--primary))":"var(--surface2)";
        var lc=act?"var(--pl)":"var(--text2)";
        html+='<button data-tid="'+t.id+'" onclick="switchTab(this.dataset.tid)" style="display:flex;align-items:center;gap:12px;width:100%;padding:10px 16px 10px 28px;background:transparent;border:none;border-left:2px solid '+(act?"var(--primary)":"transparent")+';cursor:pointer">';
        html+='<div style="width:30px;height:30px;border-radius:9px;background:'+ib+';display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0">'+t.icon+'</div>';
        html+='<span style="font-size:13px;font-weight:'+(act?"700":"400")+';color:'+lc+'">'+t.label+'</span>';
        html+='</button>';
      });
      html+='</div>';
    }
    html+='</div>';
  });
  box.innerHTML=html;
}

function toggleGrp(id){
  if(!state.openGroups)state.openGroups={};
  state.openGroups[id]=!state.openGroups[id];
  buildMenu();
}
function openMenu(){document.getElementById("mOverlay").style.display="block";document.getElementById("mDrawer").classList.add("open");}
function closeMenu(){document.getElementById("mOverlay").style.display="none";document.getElementById("mDrawer").classList.remove("open");}

function switchTab(id){
  refreshToday();
  document.querySelectorAll(".sec").forEach(function(s){s.classList.remove("active");});
  var sec=document.getElementById("sec-"+id);
  if(sec)sec.classList.add("active");
  state.currentTab=id;
  buildMenu();closeMenu();
  renderTab(id);
}

function renderTab(id){
  if(id==="Dashboard")renderDash();
  else if(id==="Tasks")renderTasks();
  else if(id==="Finance")renderFin();
  else if(id==="Goals")renderGoals();
  else if(id==="Reading")renderReading();
  else if(id==="Habits")renderHabits();
  else if(id==="Sleep")renderSleep();
  else if(id==="Beauty")renderBeauty();
  else if(id==="Eating")renderEating();
  else if(id==="Workout")renderWorkout();
  else if(id==="Mindset")renderMindset();
  else if(id==="Records")renderRecords();
}

function exportData(){
  try{
    var d=JSON.stringify(state);
    var b=new Blob([d],{type:"application/json"});
    var u=URL.createObjectURL(b);
    var a=document.createElement("a");
    a.href=u;a.download="lifeos_"+today+".json";
    document.body.appendChild(a);a.click();
    setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(u);},100);
    alert("Exported! Save the file safely.");
  }catch(e){alert("Export failed: "+e.message);}
}
function importData(){
  var i=document.createElement("input");i.type="file";i.accept=".json";
  i.onchange=function(e){
    var f=e.target.files[0];if(!f)return;
    var r=new FileReader();
    r.onload=function(ev){
      try{
        var p=JSON.parse(ev.target.result);
        if(!p||typeof p!=="object"){alert("Invalid file!");return;}
        state=Object.assign({},state,p);
        saveState();renderTab(state.currentTab);buildMenu();
        alert("Imported! ✅");
      }catch(err){alert("Import failed: "+err.message);}
    };
    r.readAsText(f);
  };
  i.click();
}

var _ss=Date.now();
function trackUsage(){
  if(!state.appUsage)state.appUsage={firstOpen:"",openDates:[],totalSessions:0,totalMinutes:0};
  var u=state.appUsage;
  if(!u.firstOpen)u.firstOpen=today;
  if(!u.openDates)u.openDates=[];
  if(u.openDates.indexOf(today)===-1)u.openDates.push(today);
  u.totalSessions=(u.totalSessions||0)+1;
  state.appUsage=u;persist();
}
function updateUsageTime(){
  if(!state.appUsage)return;
  var m=Math.round((Date.now()-_ss)/60000);
  if(m>0&&m<480){state.appUsage.totalMinutes=(state.appUsage.totalMinutes||0)+m;persist();}
}
function calcStreak(){
  var dates=(state.appUsage&&state.appUsage.openDates)||[];
  var s=0;var d=new Date();
  while(true){var ds=d.toISOString().slice(0,10);if(dates.indexOf(ds)>-1){s++;d.setDate(d.getDate()-1);}else break;}
  return s;
}

function updateClock(){
  var el=document.getElementById("htime");if(!el)return;
  var n=new Date();var h=n.getHours();var m=n.getMinutes();
  var ap=h>=12?"PM":"AM";h=h%12||12;
  el.textContent=h+":"+(m<10?"0"+m:m)+" "+ap;
}

function getWater(){
  for(var i=0;i<(state.water||[]).length;i++){if(state.water[i].date===today)return state.water[i].glasses;}
  return 0;
}
function addWater(n){
  var found=false;
  for(var i=0;i<(state.water||[]).length;i++){
    if(state.water[i].date===today){state.water[i].glasses=Math.max(0,(state.water[i].glasses||0)+n);found=true;break;}
  }
  if(!found){if(!state.water)state.water=[];state.water.push({date:today,glasses:n});}
  persist();
  if(state.currentTab==="Dashboard")renderDash();
  if(state.currentTab==="Eating")renderEating();
}
function renderDash(){
  var box=document.getElementById("dashC");if(!box)return;
  refreshToday();
  var hr=new Date().getHours();
  var gr=hr<12?"Good Morning ☀️":hr<17?"Good Afternoon 👋":"Good Evening 🌙";
  var ds=new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
  var tasks=state.tasks||[];
  var pend=tasks.filter(function(t){return !t.done;});
  var dn=tasks.filter(function(t){return t.done;});
  var tp=tasks.length?Math.round(dn.length/tasks.length*100):0;
  var gl=getWater();var wg=state.waterGoal||8;
  var tm=(state.meals||[]).filter(function(m){return m.date===today;});
  var tc=tm.reduce(function(s,m){return s+m.calories;},0);
  var cg=state.calorieGoal||2000;
  if(!state.financeMonth){var nw=new Date();var mn=nw.getMonth()+1;state.financeMonth=nw.getFullYear()+"-"+(mn<10?"0"+mn:""+mn);}
  var mk=state.financeMonth;
  var mf=(state.finance||[]).filter(function(f){return f.date&&f.date.startsWith(mk);});
  var inc=mf.filter(function(f){return f.category==="income";}).reduce(function(s,f){return s+f.amount;},0);
  var exp=mf.filter(function(f){return f.category!=="income"&&f.category!=="savings";}).reduce(function(s,f){return s+f.amount;},0);
  var bal=inc-exp;
  var fg=state.financeGoal||{name:"",target:0,saved:0};
  var gp=fg.target>0?Math.min(100,Math.round(fg.saved/fg.target*100)):0;
  var habs=state.habits||[];
  var hdn=habs.filter(function(h){return (state.habitLogs[h.id]||[]).indexOf(today)>-1;});
  var rtd=false;
  (state.books||[]).forEach(function(b){(b.sessions||[]).forEach(function(s){if(s.date===today)rtd=true;});});
  var u=state.appUsage||{};
  var streak=calcStreak();
  var tdays=(u.openDates||[]).length;
  var tmins=u.totalMinutes||0;
  var fo=u.firstOpen||today;
  var log=[];
  dn.forEach(function(t){log.push({icon:"✅",text:t.text,sub:"Task"});});
  tm.forEach(function(m){log.push({icon:"🍽️",text:m.name+" ("+m.calories+" cal)",sub:"Eating"});});
  (state.workouts||[]).filter(function(w){return w.date===today;}).forEach(function(w){log.push({icon:"💪",text:w.exercise+" "+w.sets+"×"+w.reps,sub:"Workout"});});
  (state.books||[]).forEach(function(b){(b.sessions||[]).filter(function(s){return s.date===today;}).forEach(function(s){log.push({icon:"📚",text:b.title+" "+s.pages+"p",sub:"Reading"});});});
  (state.skin||[]).filter(function(s){return s.date===today;}).forEach(function(s){log.push({icon:"🧴",text:"Skincare "+(s.time||""),sub:"Beauty"});});
  hdn.forEach(function(h){log.push({icon:h.icon||"🔥",text:h.name,sub:"Habit"});});

function logMeal(){var n=document.getElementById("fdN");var c=document.getElementById("fdC");var t=document.getElementById("fdT");if(!n||!n.value.trim()||!c||!c.value)return;if(!state.meals)state.meals=[];state.meals.push({id:"m"+Date.now(),name:n.value.trim(),calories:parseInt(c.value)||0,type:t?t.value:"snack",date:today});n.value="";c.value="";persist();renderEating();renderDash();}
function delMeal(id){state.meals=(state.meals||[]).filter(function(m){return m.id!==id;});persist();renderEating();renderDash();}
function updCG(){var i=document.getElementById("cgI");if(!i||!i.value)return;state.calorieGoal=parseInt(i.value)||2000;i.value="";persist();renderEating();}

function renderWorkout(){
  var box=document.getElementById("woC");if(!box)return;
  var ws=state.workouts||[];var tw=ws.filter(function(w){return w.date===today;});
  var html="";
  html+='<div class="card" style="margin-bottom:12px"><div class="slbl">LOG WORKOUT</div><input id="exN" class="inp" placeholder="Exercise name" style="margin-bottom:8px"><div style="display:flex;gap:8px;margin-bottom:8px"><input id="exS" class="inp" type="number" placeholder="Sets" style="flex:1"><input id="exR" class="inp" type="number" placeholder="Reps" style="flex:1"><input id="exW" class="inp" type="number" placeholder="kg" style="flex:1"></div><input id="exNt" class="inp" placeholder="Notes (optional)" style="margin-bottom:10px"><button onclick="logWO()" class="btn btnp">Log Exercise</button></div>';
  if(tw.length){
    var tr=tw.reduce(function(s,w){return s+(w.sets*w.reps);},0);
    html+='<div class="card" style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;margin-bottom:10px"><div class="slbl" style="margin:0">TODAY</div><span style="font-size:11px;color:var(--text3)">'+tr+' reps</span></div>';
    tw.forEach(function(w){html+='<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)"><div style="flex:1"><div style="font-size:14px;font-weight:600">'+w.exercise+'</div><div style="font-size:11px;color:var(--text3)">'+w.sets+' sets × '+w.reps+' reps'+(w.weight?" · "+w.weight+"kg":"")+(w.note?" · "+w.note:"")+'</div></div><button data-wid="'+w.id+'" onclick="delWO(this.dataset.wid)" style="background:none;border:none;color:var(--text3);font-size:16px;cursor:pointer">×</button></div>';});
    html+='</div>';
  } else html+='<div class="empty"><div class="ico">💪</div><p>No workout logged today.</p></div>';
  var ads=[];ws.forEach(function(w){if(ads.indexOf(w.date)===-1)ads.push(w.date);});
  ads.sort().reverse().slice(0,5).forEach(function(d){
    if(d===today)return;
    var dw=ws.filter(function(w){return w.date===d;});
    html+='<div class="csm" style="margin-bottom:8px"><div style="font-size:11px;font-weight:700;color:var(--text3);margin-bottom:6px">'+d+'</div>';
    dw.forEach(function(w){html+='<div style="font-size:13px;color:var(--text)">'+w.exercise+' — '+w.sets+'×'+w.reps+'</div>';});
    html+='</div>';
  });
  box.innerHTML=html;
}
function logWO(){var n=document.getElementById("exN");var s=document.getElementById("exS");var r=document.getElementById("exR");var wt=document.getElementById("exW");var nt=document.getElementById("exNt");if(!n||!n.value.trim())return;if(!state.workouts)state.workouts=[];state.workouts.push({id:"w"+Date.now(),exercise:n.value.trim(),sets:parseInt(s?s.value:1)||1,reps:parseInt(r?r.value:0)||0,weight:parseFloat(wt?wt.value:0)||0,note:nt?nt.value:"",date:today});n.value="";if(s)s.value="";if(r)r.value="";if(wt)wt.value="";if(nt)nt.value="";persist();renderWorkout();renderDash();}
function delWO(id){state.workouts=(state.workouts||[]).filter(function(w){return w.id!==id;});persist();renderWorkout();}

function renderMindset(){
  var box=document.getElementById("mindC");if(!box)return;
  var logs=state.mindset||[];var tl=logs.filter(function(l){return l.date===today;});
  var tm=logs.reduce(function(s,l){return s+(l.minutes||0);},0);
  var html="";
  html+='<div class="card" style="margin-bottom:12px"><div class="slbl">LOG POSITIVE CONTENT</div><input id="msT" class="inp" placeholder="Title" style="margin-bottom:8px"><input id="msC" class="inp" placeholder="Creator / Channel" style="margin-bottom:8px"><div style="display:flex;gap:8px;margin-bottom:8px"><select id="msP" class="inp" style="flex:1"><option>YouTube</option><option>Podcast</option><option>Substack</option><option>Book</option><option>Course</option><option>Article</option><option>Other</option></select><input id="msM" class="inp" type="number" placeholder="Minutes" style="flex:1"></div><input id="msTk" class="inp" placeholder="Key takeaway (optional)" style="margin-bottom:10px"><button onclick="logMS()" class="btn btnp">+ Log Content</button></div>';
  if(logs.length){html+='<div style="display:flex;gap:8px;margin-bottom:12px"><div class="card" style="flex:1;margin:0;text-align:center"><div style="font-size:22px;font-weight:900;color:var(--pl)">'+logs.length+'</div><div style="font-size:10px;color:var(--text3)">sessions</div></div><div class="card" style="flex:1;margin:0;text-align:center"><div style="font-size:22px;font-weight:900;color:var(--orange)">'+(tm>=60?Math.floor(tm/60)+"h":tm+"m")+'</div><div style="font-size:10px;color:var(--text3)">total time</div></div><div class="card" style="flex:1;margin:0;text-align:center"><div style="font-size:22px;font-weight:900;color:var(--green)">'+tl.length+'</div><div style="font-size:10px;color:var(--text3)">today</div></div></div>';}
  logs.slice().reverse().slice(0,15).forEach(function(l){html+='<div class="csm" style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div style="flex:1"><div style="font-size:13px;font-weight:700">'+l.title+'</div>'+(l.creator?'<div style="font-size:11px;color:var(--text3)">'+l.creator+'</div>':'')+(l.takeaway?'<div style="font-size:12px;color:var(--text2);margin-top:4px">💡 '+l.takeaway+'</div>':'')+'<div style="font-size:10px;color:var(--text3);margin-top:4px">'+l.platform+(l.minutes?" · "+l.minutes+"min":"")+" · "+l.date+'</div></div><button data-mid="'+l.id+'" onclick="delMS(this.dataset.mid)" style="background:none;border:none;color:var(--text3);font-size:16px;cursor:pointer;margin-left:8px">×</button></div></div>';});
  if(!logs.length)html+='<div class="empty"><div class="ico">🧠</div><p>Log positive content you\'ve consumed.</p></div>';
  box.innerHTML=html;
}
function logMS(){var t=document.getElementById("msT");var c=document.getElementById("msC");var p=document.getElementById("msP");var m=document.getElementById("msM");var tk=document.getElementById("msTk");if(!t||!t.value.trim())return;if(!state.mindset)state.mindset=[];state.mindset.push({id:"ms"+Date.now(),title:t.value.trim(),creator:c?c.value:"",platform:p?p.value:"YouTube",minutes:parseInt(m?m.value:0)||0,takeaway:tk?tk.value:"",date:today});t.value="";if(c)c.value="";if(m)m.value="";if(tk)tk.value="";persist();renderMindset();}
function delMS(id){state.mindset=(state.mindset||[]).filter(function(l){return l.id!==id;});persist();renderMindset();}

function renderRecords(){
  var box=document.getElementById("recC");if(!box)return;
  var tt=(state.tasks||[]).length;var dt=(state.tasks||[]).filter(function(t){return t.done;}).length;
  var nw=state.networth||{assets:[],liabilities:[]};
  var ta=(nw.assets||[]).reduce(function(s,a){return s+a.value;},0);
  var tl=(nw.liabilities||[]).reduce(function(s,l){return s+l.value;},0);
  var as=(state.finance||[]).filter(function(f){return f.category==="savings";}).reduce(function(s,f){return s+f.amount;},0);
  var nwv=ta+as-tl;
  var html="";
  html+='<div class="slbl">📊 ALL TIME</div>';
  html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">';
  [{icon:"✅",label:"Tasks done",val:dt+"/"+tt},{icon:"🍽️",label:"Meals logged",val:(state.meals||[]).length},{icon:"💪",label:"Workouts",val:(state.workouts||[]).length},{icon:"📚",label:"Books done",val:(state.books||[]).filter(function(b){return b.status==="done";}).length},{icon:"💰",label:"Transactions",val:(state.finance||[]).length},{icon:"🔥",label:"Habits",val:(state.habits||[]).length}].forEach(function(s){html+='<div class="csm" style="text-align:center"><div style="font-size:22px">'+s.icon+'</div><div style="font-size:18px;font-weight:800;margin:4px 0">'+s.val+'</div><div style="font-size:10px;color:var(--text3)">'+s.label+'</div></div>';});
  html+='</div>';
  html+='<div class="card"><div class="slbl">💎 NET WORTH</div><div style="font-size:28px;font-weight:900;color:'+(nwv>=0?"var(--green)":"var(--red)")+'">₹'+Math.abs(nwv).toLocaleString()+'</div><div style="display:flex;gap:16px;margin:10px 0"><div><div style="font-size:10px;color:var(--text3)">Assets</div><div style="font-size:13px;font-weight:700;color:var(--green)">₹'+(ta+as).toLocaleString()+'</div></div><div><div style="font-size:10px;color:var(--text3)">Liabilities</div><div style="font-size:13px;font-weight:700;color:var(--red)">₹'+tl.toLocaleString()+'</div></div></div>';
  html+='<input id="nwN" class="inp" placeholder="Asset / Liability name" style="margin-bottom:8px"><div style="display:flex;gap:8px;margin-bottom:10px"><input id="nwV" class="inp" type="number" placeholder="Value ₹" style="flex:1"><select id="nwT" class="inp" style="flex:1"><option value="asset">📈 Asset</option><option value="liability">📉 Liability</option></select></div><button onclick="addNW()" class="btn btng">+ Add Item</button>';
  if((nw.assets||[]).length||(nw.liabilities||[]).length){
    html+='<div style="margin-top:12px">';
    (nw.assets||[]).forEach(function(a){html+='<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)"><span style="font-size:12px">📈 '+a.name+'</span><div style="display:flex;align-items:center;gap:8px"><span style="font-size:12px;font-weight:700;color:var(--green)">₹'+a.value.toLocaleString()+'</span><button data-nid="'+a.id+'" onclick="delNW(this.dataset.nid,\'asset\')" style="background:none;border:none;color:var(--text3);font-size:14px;cursor:pointer">×</button></div></div>';});
    (nw.liabilities||[]).forEach(function(l){html+='<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)"><span style="font-size:12px">📉 '+l.name+'</span><div style="display:flex;align-items:center;gap:8px"><span style="font-size:12px;font-weight:700;color:var(--red)">₹'+l.value.toLocaleString()+'</span><button data-nid="'+l.id+'" onclick="delNW(this.dataset.nid,\'liability\')" style="background:none;border:none;color:var(--text3);font-size:14px;cursor:pointer">×</button></div></div>';});
    html+='</div>';
  }
  html+='</div>';
  box.innerHTML=html;
}
function addNW(){var n=document.getElementById("nwN");var v=document.getElementById("nwV");var t=document.getElementById("nwT");if(!n||!n.value.trim()||!v||!v.value)return;if(!state.networth)state.networth={assets:[],liabilities:[]};var it={id:"nw"+Date.now(),name:n.value.trim(),value:parseFloat(v.value)||0};if(t&&t.value==="liability")state.networth.liabilities.push(it);else state.networth.assets.push(it);n.value="";v.value="";persist();renderRecords();}
function delNW(id,type){if(!state.networth)return;if(type==="liability")state.networth.liabilities=(state.networth.liabilities||[]).filter(function(i){return i.id!==id;});else state.networth.assets=(state.networth.assets||[]).filter(function(i){return i.id!==id;});persist();renderRecords();}

setInterval(function(){
  updateClock();
  var prev=today;refreshToday();
  if(prev!==today){var db=document.getElementById("dashC");if(db)db.innerHTML="";renderDash();}
},30000);

try{
  loadState();
  if(!state.habits)state.habits=[];if(!state.habitLogs)state.habitLogs={};
  if(!state.sleep)state.sleep=[];if(!state.finance)state.finance=[];
  if(!state.articles)state.articles=[];if(!state.goals)state.goals=[];
  if(!state.books)state.books=[];if(!state.quotes)state.quotes=[];
  if(!state.mindset)state.mindset=[];if(!state.workouts)state.workouts=[];
  if(!state.meals)state.meals=[];if(!state.water)state.water=[];
  if(!state.skin)state.skin=[];if(!state.hair)state.hair=[];
  if(!state.savingsJars)state.savingsJars=[];if(!state.tasks)state.tasks=[];
  if(!state.networth)state.networth={assets:[],liabilities:[]};
  if(!state.openGroups)state.openGroups={life:true};
  state.currentTab="Dashboard";
  buildMenu();renderDash();updateClock();trackUsage();
  window.addEventListener("pagehide",function(){updateUsageTime();});
  window.addEventListener("beforeunload",function(){updateUsageTime();});
}catch(e){
  console.error("Init error:",e.message);
  document.body.innerHTML+='<div style="position:fixed;bottom:0;left:0;right:0;background:red;color:#fff;padding:10px;font-size:12px;z-index:9999">Error: '+e.message+'</div>';
}
</script>
</body></html>
